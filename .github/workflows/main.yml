name: Run Crypto Bot

on:
  schedule:
    - cron: '0 * * * *'  # တစ်နာရီတစ်ခါ ပုံမှန် Run မည်
  workflow_dispatch:      # ကိုယ့်ဘာသာ Button နှိပ်ပြီး စမ်းသပ်နိုင်ရန်

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Library ၃ ခုလုံးကို သေချာပေါက်သွင်းရန် တိုက်ရိုက်ခိုင်းထားပါသည်
          pip install requests feedparser google-generativeai

      - name: Run Python Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python crypto_news_bot.py
